<form action="https://formspree.io/f/xwvrrnnew" method="POST" style="margin-top: 20px;">

  <label for="message" style="display:block; margin-bottom:6px; font-weight:600;">
    La tua domanda
  </label>
  <textarea id="message" name="message" required
    style="width:100%; min-height:140px; padding:10px; border:1px solid #ccc; border-radius:4px; font-size:16px;"></textarea>

  <label for="contact-method" style="display:block; margin-top:20px; margin-bottom:6px; font-weight:600;">
    Come preferisci ricevere la risposta?
  </label>
  <select id="contact-method" name="contact-method" required onchange="toggleContactFields()"
    style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; font-size:16px;">
    <option value="">Seleziona un’opzione</option>
    <option value="email">Email</option>
    <option value="phone">Numero di cellulare</option>
    <option value="none">Non voglio lasciare un contatto</option>
  </select>

  <div id="email-field" style="display:none; margin-top:15px;">
    <label for="email" style="display:block; margin-bottom:6px; font-weight:600;">
      La tua email
    </label>
    <input type="email" id="email" name="email"
      style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; font-size:16px;">
  </div>

  <div id="phone-field" style="display:none; margin-top:15px;">
    <label for="phone" style="display:block; margin-bottom:6px; font-weight:600;">
      Numero di cellulare
    </label>
    <input type="tel" id="phone" name="phone"
      style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; font-size:16px;">

    <label for="phone-preference" style="display:block; margin-top:15px; margin-bottom:6px; font-weight:600;">
      Preferisci ricevere la risposta via:
    </label>
    <select id="phone-preference" name="phone-preference"
      style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; font-size:16px;">
      <option value="sms">SMS</option>
      <option value="whatsapp">WhatsApp</option>
    </select>
  </div>

  <p style="font-size:0.9em; color:#555; margin-top:15px; line-height:1.4;">
    Se non lasci un contatto, non potrò risponderti direttamente.  
    La tua domanda resterà comunque completamente privata.
  </p>

  <button type="submit"
    style="margin-top:20px; padding:12px 20px; background-color:#245f89; color:white; border:none; border-radius:4px; font-size:16px; cursor:pointer;">
    Invia
  </button>

</form>

<script>
function toggleContactFields() {
  const method = document.getElementById("contact-method").value;
  document.getElementById("email-field").style.display = method === "email" ? "block" : "none";
  document.getElementById("phone-field").style.display = method === "phone" ? "block" : "none";
}
</script>
